<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hybrid Intelligence Studio – David Fliesen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050814;
      --bg-alt: #0b1020;
      --accent: #3AAFFF;
      --accent2: #E86BD8;
      --text: #f5f5f5;
      --muted: #9ca3af;
      --card: #111827;
      --border: #1f2933;
      --link: #7dd3fc;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-future: "Orbitron", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header {
      width: 100%;
      background: radial-gradient(circle at 20% 0, rgba(58,175,255,0.35) 0, transparent 55%),
                  radial-gradient(circle at 80% 0, rgba(232,107,216,0.35) 0, transparent 55%),
                  linear-gradient(135deg, #020617 0, #020617 40%, #050816 100%);
      border-bottom: 1px solid rgba(148,163,184,0.25);
      overflow: hidden;
    }

    .hero {
      max-width: 1120px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 3.75rem;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 2.5rem;
      align-items: center;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: minmax(0, 1fr);
        padding-top: 2.75rem;
        padding-bottom: 2.75rem;
      }
    }

    .hero-left h1 {
      font-family: var(--font-future);
      font-size: clamp(2.1rem, 3vw + 1rem, 3rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .hero-left h1 span.hybrid {
      color: var(--accent);
    }

    .hero-left h1 span.studio {
      color: #e5e7eb;
    }

    .hero-subtitle {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .hero-tagline {
      font-size: 1rem;
      color: #e5e7eb;
      max-width: 32rem;
      margin-bottom: 1.75rem;
    }

    .hero-meta {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .hero-meta strong {
      color: #e5e7eb;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .btn-primary,
    .btn-ghost {
      border-radius: 999px;
      padding: 0.6rem 1.4rem;
      font-size: 0.9rem;
      border: 1px solid transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
      transition: all 0.18s ease-out;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0b1020;
      font-weight: 600;
      box-shadow: 0 0 25px rgba(58,175,255,0.35);
    }

      filter: brightness(1.05);
      box-shadow: 0 0 30px rgba(
