<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Mockup Comparison — David Fliesen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --border: #252529;
      --border-hover: #3a3a42;
      --text: #e8e8ec;
      --muted: #6b6b78;
      --accent: #f0c040;
      --accent2: #4af0b8;
      --label-height: 56px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 52px 48px 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .header-left h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      letter-spacing: 0.04em;
      line-height: 0.95;
      color: var(--text);
    }

    .header-left h1 span {
      color: var(--accent);
    }

    .header-left p {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-right {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      line-height: 1.8;
    }

    .header-right span {
      color: var(--accent2);
    }

    /* ── GRID ── */
    .grid-wrapper {
      padding: 40px 48px 64px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 18px 48px rgba(0,0,0,0.55);
    }

    /* iframe preview container */
    .preview-wrap {
      position: relative;
      width: 100%;
      padding-top: 65%; /* aspect ratio box */
      overflow: hidden;
      background: #1a1a1e;
      border-bottom: 1px solid var(--border);
    }

    .preview-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1280px;
      height: 900px;
      transform-origin: top left;
      border: none;
      pointer-events: none;
    }

    /* scale iframe to fit the box — set by JS */
    .preview-wrap .iframe-scaler {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* loading overlay */
    .preview-wrap .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1e;
      z-index: 2;
      transition: opacity 0.5s;
    }

    .loading-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; margin: 0 6px; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    /* ── CARD LABEL ── */
    .card-label {
      height: var(--label-height);
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-name strong {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .card-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .card-link:hover { color: var(--accent); }

    .card-link svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    /* color accents per AI */
    .dot-claude   { background: #d97647; }
    .dot-chatgpt  { background: #10a37f; }
    .dot-gemini   { background: #4285f4; }
    .dot-grok     { background: #e0e0e0; }
    .dot-copilot  { background: #7b7bef; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    footer p {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    footer .tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* ── CLICK OVERLAY ── */
    .card-overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Portfolio<br><span>Mockup</span> Review</h1>
    <p>David Fliesen &nbsp;·&nbsp; 5 AI-Generated Designs</p>
  </div>
  <div class="header-right">
    <div>Comparing <span>5</span> Designs</div>
    <div>Click any card to open full preview</div>
    <div>davidfliesen.github.io</div>
  </div>
</header>

<div class="grid-wrapper">
  <div class="grid" id="grid"></div>
</div>

<footer>
  <p>Portfolio Mockup Comparison &nbsp;—&nbsp; David Fliesen</p>
  <span class="tag">AI Design Sprint 2025</span>
</footer>

<script>
  const mockups = [
    {
      name: "Claude",
      slug: "claude",
      url: "https://davidfliesen.github.io/claude.html",
      dotClass: "dot-claude"
    },
    {
      name: "ChatGPT",
      slug: "chatgpt",
      url: "https://davidfliesen.github.io/chatgpt.html",
      dotClass: "dot-chatgpt"
    },
    {
      name: "Google Gemini",
      slug: "gemini",
      url: "https://davidfliesen.github.io/gemini.html",
      dotClass: "dot-gemini"
    },
    {
      name: "Grok",
      slug: "grok",
      url: "https://davidfliesen.github.io/grok.html",
      dotClass: "dot-grok"
    },
    {
      name: "Microsoft Copilot",
      slug: "copilot",
      url: "https://davidfliesen.github.io/copilot.html",
      dotClass: "dot-copilot"
    }
  ];

  const grid = document.getElementById('grid');

  mockups.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="preview-wrap" id="wrap-${m.slug}">
        <div class="loading" id="loading-${m.slug}">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
        <div class="iframe-scaler" id="scaler-${m.slug}">
          <iframe
            id="iframe-${m.slug}"
            src="${m.url}"
            title="${m.name} mockup preview"
            loading="lazy"
            sandbox="allow-same-origin allow-scripts"
          ></iframe>
        </div>
        <a class="card-overlay" href="${m.url}" target="_blank" rel="noopener" aria-label="Open ${m.name} design"></a>
      </div>
      <div class="card-label">
        <div class="card-name">
          <span class="ai-dot ${m.dotClass}"></span>
          <strong>${m.name}</strong>
        </div>
        <a class="card-link" href="${m.url}" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 8h10M8.5 3.5L13 8l-4.5 4.5"/>
          </svg>
          Open
        </a>
      </div>
    `;
    grid.appendChild(card);
  });

  // Scale iframes to fill their container
  function scaleIframes() {
    mockups.forEach(m => {
      const wrap = document.getElementById(`wrap-${m.slug}`);
      const iframe = document.getElementById(`iframe-${m.slug}`);
      if (!wrap || !iframe) return;
      const wrapW = wrap.offsetWidth;
      const scale = wrapW / 1280;
      iframe.style.transform = `scale(${scale})`;
    });
  }

  // Hide loading overlay once iframe is loaded
  mockups.forEach(m => {
    const iframe = document.getElementById(`iframe-${m.slug}`);
    const loading = document.getElementById(`loading-${m.slug}`);
    if (!iframe || !loading) return;
    iframe.addEventListener('load', () => {
      loading.style.opacity = '0';
      setTimeout(() => { loading.style.display = 'none'; }, 500);
    });
    // Fallback: hide after 6s in case load event doesn't fire
    setTimeout(() => {
      loading.style.opacity = '0';
      setTimeout(() => { loading.style.display = 'none'; }, 500);
    }, 6000);
  });

  scaleIframes();
  window.addEventListener('resize', scaleIframes);
</script>
</body>
</html>
