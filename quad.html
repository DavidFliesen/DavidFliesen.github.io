<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="QUAD — View 4 YouTube videos or websites simultaneously. Built by David Fliesen / Cibola Studios.">
<title>QUAD // COMMAND CENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --bg:        #020408;
  --bg2:       #060d14;
  --panel:     #080f18;
  --panel2:    #0b1520;
  --border:    #0d2035;
  --border2:   #163050;
  --cyan:      #00e5ff;
  --cyan-dim:  rgba(0,229,255,0.08);
  --cyan-mid:  rgba(0,229,255,0.25);
  --orange:    #ff6d00;
  --orange-dim:rgba(255,109,0,0.15);
  --green:     #39ff14;
  --green-dim: rgba(57,255,20,0.1);
  --purple:    #d500f9;
  --red:       #ff1744;
  --text:      #c8e6f0;
  --text-dim:  #4a7a8a;
  --glow-c:    0 0 12px rgba(0,229,255,0.6), 0 0 30px rgba(0,229,255,0.2);
  --glow-o:    0 0 12px rgba(255,109,0,0.6);
  --glow-g:    0 0 12px rgba(57,255,20,0.5);
  --gap:       8px;
  --bar:       72px;
  --hdr:       52px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  cursor:default;
}

/* scanline overlay */
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events:none;
  z-index:9999;
}

/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
#topbar {
  height: var(--bar);
  background: linear-gradient(180deg, #0a1828 0%, var(--panel) 100%);
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  position: relative;
  z-index: 200;
  box-shadow: 0 2px 30px rgba(0,229,255,0.08);
}

/* top edge glow line */
#topbar::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg,
    transparent 0%, var(--cyan) 20%, var(--cyan) 80%, transparent 100%);
  opacity:.6;
}

/* logo */
#logo {
  display:flex; flex-direction:column; gap:1px; flex-shrink:0;
}
#logo-main {
  font-family:'Orbitron', sans-serif;
  font-weight:900; font-size:26px;
  letter-spacing:.2em;
  color:var(--cyan);
  text-shadow: var(--glow-c);
  line-height:1;
}
#logo-sub {
  font-size:9px; letter-spacing:.25em;
  color:var(--text-dim);
  text-transform:uppercase;
  padding-left:2px;
}

/* live indicator */
#live-wrap {
  display:flex; align-items:center; gap:6px;
  background:var(--green-dim);
  border:1px solid rgba(57,255,20,0.3);
  border-radius:2px;
  padding:4px 10px;
  flex-shrink:0;
}
#live-dot {
  width:8px; height:8px;
  background:var(--green);
  border-radius:50%;
  box-shadow: var(--glow-g);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
#live-label {
  font-size:10px; letter-spacing:.2em;
  color:var(--green);
  font-family:'Orbitron',sans-serif; font-weight:600;
}

/* divider */
.sep {
  width:1px; height:36px;
  background: linear-gradient(180deg, transparent, var(--border2), transparent);
  flex-shrink:0;
}

/* layout buttons */
#layout-bar { display:flex; gap:6px; align-items:center; }

.ly-btn {
  width:40px; height:32px;
  background:var(--panel2);
  border:1px solid var(--border2);
  border-radius:3px;
  cursor:pointer;
  display:grid; gap:2px; padding:5px;
  transition:all .2s;
  position:relative; overflow:hidden;
}
.ly-btn::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, var(--cyan-dim), transparent);
  opacity:0; transition:opacity .2s;
}
.ly-btn:hover::before, .ly-btn.on::before { opacity:1; }
.ly-btn:hover, .ly-btn.on {
  border-color:var(--cyan);
  box-shadow: 0 0 10px rgba(0,229,255,0.3);
}
.ly-btn .s { background:var(--border2); border-radius:1px; transition:background .2s; }
.ly-btn.on .s, .ly-btn:hover .s { background:var(--cyan); }

.li-quad { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
.li-pip  { grid-template-columns:2fr 1fr; grid-template-rows:1fr 1fr; }
.li-pip .s:first-child { grid-row:1/3; }
.li-full { grid-template-columns:1fr; grid-template-rows:1fr; }

/* action buttons */
.act-btn {
  height:36px;
  background:var(--panel2);
  border:1px solid var(--border2);
  color:var(--text-dim);
  font-family:'Orbitron', sans-serif;
  font-size:10px; font-weight:600;
  letter-spacing:.12em;
  padding:0 14px;
  border-radius:3px;
  cursor:pointer;
  white-space:nowrap;
  transition:all .2s;
  position:relative; overflow:hidden;
  display:flex; align-items:center; gap:6px;
}
.act-btn::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, var(--cyan-dim), transparent);
  opacity:0; transition:opacity .2s;
}
.act-btn:hover::before { opacity:1; }
.act-btn:hover {
  border-color:var(--cyan);
  color:var(--cyan);
  box-shadow: 0 0 12px rgba(0,229,255,0.25);
}
.act-btn.danger:hover {
  border-color:var(--red);
  color:var(--red);
  box-shadow: 0 0 12px rgba(255,23,68,0.3);
}
.act-btn.danger:hover::before {
  background:linear-gradient(135deg, rgba(255,23,68,0.1), transparent);
}

/* system clock */
#sys-info {
  margin-left:auto;
  display:flex; flex-direction:column; align-items:flex-end; gap:2px;
}
#sys-time {
  font-family:'Orbitron',sans-serif; font-weight:600;
  font-size:18px; color:var(--cyan);
  text-shadow: var(--glow-c);
  letter-spacing:.1em;
}
#sys-date {
  font-size:9px; color:var(--text-dim); letter-spacing:.15em;
}

/* ══════════════════════════════════════════
   GRID
══════════════════════════════════════════ */
#grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:var(--gap); padding:var(--gap);
  width:100%; height:calc(100vh - var(--bar));
}
#grid.l-pip { grid-template-columns:3fr 1fr; }
#grid.l-pip .cell:first-child { grid-row:1/3; }
#grid.l-full .cell { display:none; }
#grid.l-full .cell.focused { display:flex; grid-column:1/3; grid-row:1/3; }

/* ══════════════════════════════════════════
   CELL
══════════════════════════════════════════ */
.cell {
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:4px;
  overflow:hidden;
  display:flex; flex-direction:column;
  position:relative;
  transition:border-color .25s, box-shadow .25s;
  min-width:0; min-height:0;
}

.cell.focused {
  border-color:var(--cyan);
  box-shadow: 0 0 0 1px var(--cyan),
              0 0 30px rgba(0,229,255,0.15),
              inset 0 0 30px rgba(0,229,255,0.03);
}

/* corner bracket decorations */
.cell::before, .cell::after,
.cell-body::before, .cell-body::after {
  content:'';
  position:absolute;
  width:14px; height:14px;
  z-index:15;
  pointer-events:none;
  transition:border-color .25s;
}
.cell::before  { top:0;    left:0;  border-top:2px solid var(--border2);  border-left:2px solid var(--border2); }
.cell::after   { top:0;    right:0; border-top:2px solid var(--border2);  border-right:2px solid var(--border2); }
.cell.focused::before { border-color:var(--cyan); }
.cell.focused::after  { border-color:var(--cyan); }

.cell-corners-bottom::before,
.cell-corners-bottom::after {
  content:'';
  position:absolute;
  width:14px; height:14px;
  z-index:15; pointer-events:none;
  transition:border-color .25s;
}
.cell-corners-bottom::before { bottom:0; left:0;  border-bottom:2px solid var(--border2); border-left:2px solid var(--border2); }
.cell-corners-bottom::after  { bottom:0; right:0; border-bottom:2px solid var(--border2); border-right:2px solid var(--border2); }
.cell.focused .cell-corners-bottom::before,
.cell.focused .cell-corners-bottom::after { border-color:var(--cyan); }

/* mode stripe */
.cell .mode-stripe {
  position:absolute; top:0; left:0; right:0; height:2px; z-index:10;
  background:var(--border2); transition:background .25s, box-shadow .25s;
}
.cell.mode-yt    .mode-stripe { background:var(--orange); box-shadow:var(--glow-o); }
.cell.mode-vimeo .mode-stripe { background:var(--purple); }
.cell.mode-web   .mode-stripe { background:var(--cyan);   box-shadow:var(--glow-c); }

/* ── CELL HEADER ── */
.cell-hdr {
  height:var(--hdr); min-height:var(--hdr);
  background: linear-gradient(180deg, #0c1a28 0%, var(--panel2) 100%);
  border-bottom:1px solid var(--border2);
  display:flex; align-items:center;
  padding:0 12px; gap:8px;
  z-index:10; margin-top:2px;
  flex-shrink:0;
}

/* channel ID tag */
.ch-tag {
  font-family:'Orbitron',sans-serif; font-weight:700;
  font-size:11px; letter-spacing:.15em;
  color:var(--bg);
  padding:4px 8px;
  border-radius:2px;
  flex-shrink:0;
  min-width:36px; text-align:center;
  background:var(--text-dim);
  transition:all .2s;
}
.cell.mode-yt    .ch-tag { background:var(--orange); color:#000; }
.cell.mode-vimeo .ch-tag { background:var(--purple); color:#fff; }
.cell.mode-web   .ch-tag { background:var(--cyan);   color:var(--bg); box-shadow:var(--glow-c); }

/* mode badge */
.mode-badge {
  font-family:'Orbitron',sans-serif; font-weight:600;
  font-size:9px; letter-spacing:.12em;
  color:var(--text-dim);
  flex-shrink:0; min-width:42px;
  transition:color .2s;
}
.cell.mode-yt    .mode-badge { color:var(--orange); }
.cell.mode-vimeo .mode-badge { color:var(--purple); }
.cell.mode-web   .mode-badge { color:var(--cyan); }

/* url input */
.url-field {
  flex:1;
  background:rgba(0,229,255,0.04);
  border:1px solid var(--border2);
  outline:none;
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
  font-size:13px;
  padding:8px 12px;
  border-radius:3px;
  transition:border-color .15s, box-shadow .15s;
  min-width:0;
  height:36px;
}
.url-field:focus {
  border-color:var(--cyan);
  box-shadow: 0 0 0 1px rgba(0,229,255,0.2), inset 0 0 8px rgba(0,229,255,0.05);
}
.url-field::placeholder { color:var(--text-dim); font-size:11px; }

/* GO button */
.go-btn {
  height:36px; padding:0 16px;
  background:var(--cyan);
  border:none; color:var(--bg);
  font-family:'Orbitron', sans-serif;
  font-size:11px; font-weight:700;
  letter-spacing:.15em;
  border-radius:3px;
  cursor:pointer; flex-shrink:0;
  transition:all .15s;
  box-shadow: 0 0 14px rgba(0,229,255,0.4);
  position:relative; overflow:hidden;
}
.go-btn::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent);
}
.go-btn:hover {
  background:#33ecff;
  box-shadow: 0 0 22px rgba(0,229,255,0.7);
  transform:translateY(-1px);
}
.go-btn:active { transform:translateY(0); }

/* icon buttons */
.hdr-actions { display:flex; gap:6px; flex-shrink:0; }

.ic {
  width:36px; height:36px;
  background:var(--panel2);
  border:1px solid var(--border2);
  color:var(--text-dim);
  font-size:15px;
  border-radius:3px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.ic:hover { border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 10px rgba(0,229,255,0.2); }
.ic.muted { border-color:var(--orange); color:var(--orange); }

/* ── CELL BODY ── */
.cell-body {
  flex:1; position:relative; overflow:hidden; background:#000;
}

.yt-target    { position:absolute; inset:0; width:100%; height:100%; z-index:1; }
.embed-frame  { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; z-index:1; }
.embed-frame.show { display:block; }
.web-frame    { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; background:#fff; z-index:1; }
.web-frame.show { display:block; }

/* spinner */
.spinner {
  position:absolute; inset:0; display:none;
  flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  background:var(--panel); z-index:8;
}
.spinner.show { display:flex; }
.spin-ring {
  width:40px; height:40px;
  border:2px solid var(--border2);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin .8s linear infinite;
  box-shadow: 0 0 16px rgba(0,229,255,0.3);
}
@keyframes spin { to{transform:rotate(360deg)} }
.spin-label {
  font-family:'Orbitron',sans-serif; font-size:9px;
  letter-spacing:.2em; color:var(--text-dim);
  animation:fade 1.2s ease-in-out infinite;
}
@keyframes fade { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── DROP ZONE ── */
.drop-zone {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  background:var(--panel); z-index:5; cursor:pointer;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:40px 40px;
}
.drop-zone.gone { display:none; }

.dz-icon {
  font-family:'Orbitron',sans-serif; font-weight:900;
  font-size:72px; line-height:1;
  color:var(--cyan); opacity:.06;
  pointer-events:none;
  letter-spacing:-.02em;
}
.dz-hint {
  font-family:'Orbitron',sans-serif;
  font-size:10px; color:var(--text-dim);
  letter-spacing:.15em; text-align:center; line-height:2;
  text-transform:uppercase;
}

/* quick picks */
.qp-row {
  display:flex; flex-wrap:wrap; gap:6px;
  justify-content:center; padding:0 20px; max-width:380px;
}
.qp {
  background:var(--panel2);
  border:1px solid var(--border2);
  color:var(--text-dim);
  font-family:'Share Tech Mono', monospace;
  font-size:11px; padding:6px 12px;
  border-radius:2px; cursor:pointer;
  white-space:nowrap; transition:all .15s;
  letter-spacing:.05em;
}
.qp:hover     { border-color:var(--cyan);   color:var(--cyan);   background:var(--cyan-dim); }
.qp.yt:hover  { border-color:var(--orange); color:var(--orange); background:var(--orange-dim); }

/* ── ERROR OVERLAY ── */
.err-overlay {
  position:absolute; inset:0; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:12px;
  background:rgba(2,4,8,0.95); z-index:9; padding:24px; text-align:center;
}
.err-overlay.show { display:flex; }
.err-icon  { font-size:36px; opacity:.5; }
.err-title {
  font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700;
  color:var(--red); letter-spacing:.1em; text-transform:uppercase;
}
.err-sub   { font-size:11px; color:var(--text-dim); line-height:1.9; max-width:280px; }
.err-open  {
  height:38px; padding:0 18px;
  background:transparent;
  border:1px solid var(--orange); color:var(--orange);
  font-family:'Orbitron', sans-serif; font-size:10px; font-weight:600;
  letter-spacing:.12em;
  border-radius:3px; cursor:pointer; margin-top:4px;
  transition:all .2s;
}
.err-open:hover {
  background:var(--orange-dim);
  box-shadow:var(--glow-o);
}

/* ── HOVER OVERLAY ── */
.cell-ov {
  position:absolute; bottom:10px; right:10px;
  display:flex; gap:6px; opacity:0; transition:opacity .2s; z-index:20;
}
.cell:hover .cell-ov { opacity:1; }
.ov-b {
  height:34px; padding:0 14px;
  background:rgba(6,13,20,0.92);
  border:1px solid var(--border2); color:var(--text-dim);
  font-family:'Orbitron', sans-serif; font-size:9px; font-weight:600;
  letter-spacing:.12em;
  border-radius:3px; cursor:pointer;
  backdrop-filter:blur(8px); transition:all .15s;
}
.ov-b:hover { border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 10px rgba(0,229,255,0.2); }

/* ── BOTTOM DECORATION BAR ── */
.cell-foot {
  height:3px; flex-shrink:0;
  background: linear-gradient(90deg,
    transparent 0%, var(--border2) 20%, var(--border2) 80%, transparent 100%);
  transition:background .25s;
}
.cell.mode-yt    .cell-foot { background:linear-gradient(90deg,transparent,var(--orange),transparent); }
.cell.mode-vimeo .cell-foot { background:linear-gradient(90deg,transparent,var(--purple),transparent); }
.cell.mode-web   .cell-foot { background:linear-gradient(90deg,transparent,var(--cyan),transparent); }
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div id="topbar">
  <div id="logo">
    <div id="logo-main">QUAD</div>
    <div id="logo-sub">// COMMAND CENTER</div>
  </div>

  <div id="live-wrap">
    <div id="live-dot"></div>
    <div id="live-label">LIVE</div>
  </div>

  <div class="sep"></div>

  <div id="layout-bar">
    <div class="ly-btn li-quad on" title="2×2 Grid" onclick="setLayout('quad',this)">
      <div class="s"></div><div class="s"></div>
      <div class="s"></div><div class="s"></div>
    </div>
    <div class="ly-btn li-pip" title="Focus + Side" onclick="setLayout('pip',this)">
      <div class="s"></div><div class="s"></div><div class="s"></div>
    </div>
    <div class="ly-btn li-full" title="Solo" onclick="setLayout('full',this)">
      <div class="s"></div>
    </div>
  </div>

  <div class="sep"></div>

  <button class="act-btn" onclick="pauseAll()">⏸ PAUSE ALL</button>
  <button class="act-btn" onclick="playAll()">▶ PLAY ALL</button>
  <button class="act-btn" onclick="reloadAll()">↺ RELOAD</button>
  <button class="act-btn danger" onclick="clearAll()">✕ CLEAR</button>

  <div id="sys-info">
    <div id="sys-time">00:00:00</div>
    <div id="sys-date">INITIALIZING</div>
  </div>
</div>

<!-- ══ GRID ══ -->
<div id="grid"></div>

<script>
// ══ CONFIG ══
const YT_PICKS = [
  { label:'LOFI RADIO',  id:'jfKfPfyJRdk' },
  { label:'ISS EARTH',   id:'86YLFOog4GM' },
  { label:'DEEP OCEAN',  id:'BHACKCNDMW8' },
  { label:'JAZZ CAFE',   id:'NEuZxGSl8DQ' },
  { label:'4K NATURE',   id:'LXb3EKWsInQ' },
  { label:'NASA TV',     id:'nA9UZF-SZoQ' },
];
const WEB_PICKS = [
  { label:'WIKIPEDIA',   url:'https://en.wikipedia.org' },
  { label:'HACKER NEWS', url:'https://news.ycombinator.com' },
  { label:'NASA.GOV',    url:'https://www.nasa.gov' },
  { label:'BBC NEWS',    url:'https://www.bbc.com/news' },
];

const CELLS = 4;
let players = new Array(CELLS).fill(null);
let ytReady = false;
let pending = {};
let layout  = 'quad';

let S = Array.from({length:CELLS}, (_,i) => ({
  mode:'empty', videoId:'', webUrl:'', muted:false, focused:i===0, errUrl:''
}));

// ══ CLOCK ══
function updateClock() {
  const now  = new Date();
  const time = now.toTimeString().slice(0,8);
  const date = now.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}).toUpperCase();
  document.getElementById('sys-time').textContent = time;
  document.getElementById('sys-date').textContent = date;
}
setInterval(updateClock, 1000);
updateClock();

// ══ URL DETECTION ══
function detectType(raw) {
  if (/youtu\.be\/|youtube\.com/i.test(raw))  return 'yt';
  if (/vimeo\.com/i.test(raw))                return 'vimeo';
  if (/^[a-zA-Z0-9_-]{11}$/.test(raw.trim())) return 'yt';
  return 'web';
}
function extractYouTubeId(raw) {
  raw = raw.trim();
  let m;
  m = raw.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);       if(m) return m[1];
  m = raw.match(/[?&]v=([a-zA-Z0-9_-]{11})/);            if(m) return m[1];
  m = raw.match(/\/embed\/([a-zA-Z0-9_-]{11})/);         if(m) return m[1];
  m = raw.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);        if(m) return m[1];
  if(/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
  return null;
}
function extractVimeoId(raw) {
  const m = raw.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  return m ? m[1] : null;
}
function normalizeUrl(raw) {
  raw = raw.trim();
  if(!raw) return '';
  if(/^https?:\/\//i.test(raw)) return raw;
  if(/^[\w-]+\.[a-z]{2,}/i.test(raw)) return 'https://'+raw;
  return 'https://www.google.com/search?q='+encodeURIComponent(raw);
}

// ══ BUILD GRID ══
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for(let i=0;i<CELLS;i++){
    const c = document.createElement('div');
    c.id = `cell-${i}`;
    c.className = 'cell'+(S[i].focused?' focused':'');
    c.innerHTML = cellHTML(i);
    grid.appendChild(c);
  }
}

function cellHTML(i) {
  const ytQP  = YT_PICKS.map(q=>
    `<button class="qp yt" onclick="event.stopPropagation();loadYT(${i},'${q.id}')">${q.label}</button>`).join('');
  const webQP = WEB_PICKS.map(q=>
    `<button class="qp" onclick="event.stopPropagation();loadWeb(${i},'${q.url}')">${q.label}</button>`).join('');

  return `
    <div class="mode-stripe"></div>
    <div class="cell-hdr" onclick="event.stopPropagation()">
      <span class="ch-tag" id="badge-${i}">CH${i+1}</span>
      <span class="mode-badge" id="mode-${i}">EMPTY</span>
      <input class="url-field" id="url-${i}" type="url" inputmode="url"
        placeholder="Paste YouTube, Vimeo, or any website URL…"
        onkeydown="if(event.key==='Enter'){event.preventDefault();goCell(${i})}">
      <button class="go-btn" onclick="goCell(${i})">GO</button>
      <div class="hdr-actions">
        <button class="ic" id="mute-${i}" onclick="toggleMute(${i})" title="Mute/Unmute">🔊</button>
        <button class="ic" onclick="focusCell(${i})" title="Focus pane">◉</button>
        <button class="ic" onclick="clearCell(${i})" title="Clear pane">✕</button>
      </div>
    </div>
    <div class="cell-body" id="body-${i}">
      <div class="spinner" id="spin-${i}">
        <div class="spin-ring"></div>
        <div class="spin-label">LOADING SIGNAL…</div>
      </div>
      <div class="yt-target" id="yt-${i}"></div>
      <iframe class="embed-frame" id="embed-${i}" allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture"></iframe>
      <iframe class="web-frame" id="web-${i}"></iframe>
      <div class="drop-zone" id="dz-${i}" onclick="document.getElementById('url-${i}').focus()">
        <div class="dz-icon">${i+1}</div>
        <div class="dz-hint">CHANNEL ${i+1} // AWAITING SIGNAL<br>PASTE ANY URL ABOVE AND TAP GO</div>
        <div class="qp-row">${ytQP}${webQP}</div>
      </div>
      <div class="err-overlay" id="err-${i}">
        <div class="err-icon">⚠</div>
        <div class="err-title" id="err-title-${i}">SIGNAL LOST</div>
        <div class="err-sub"   id="err-sub-${i}"></div>
        <button class="err-open" id="err-open-${i}" onclick="openTab(${i})" style="display:none">
          OPEN IN NEW TAB ↗
        </button>
      </div>
    </div>
    <div class="cell-corners-bottom"></div>
    <div class="cell-ov">
      <button class="ov-b" onclick="focusCell(${i})">FOCUS</button>
      <button class="ov-b" onclick="clearCell(${i})">CLEAR</button>
    </div>
    <div class="cell-foot"></div>`;
}

// ══ GO ══
function goCell(i) {
  const raw = document.getElementById(`url-${i}`).value.trim();
  if(!raw) return;
  const type = detectType(raw);
  if(type==='yt') {
    const vid = extractYouTubeId(raw);
    if(vid){ loadYT(i,vid); return; }
    showErr(i,'INVALID SIGNAL','Could not extract a YouTube video ID from that URL.',false);
    return;
  }
  if(type==='vimeo') {
    const vid = extractVimeoId(raw);
    if(vid){ loadVimeo(i,vid); return; }
    showErr(i,'INVALID SIGNAL','Could not extract a Vimeo video ID from that URL.',false);
    return;
  }
  loadWeb(i, normalizeUrl(raw));
}

// ══ YOUTUBE ══
function loadYT(i, vid) {
  setMode(i,'yt');
  S[i].videoId = vid;
  S[i].errUrl  = `https://www.youtube.com/watch?v=${vid}`;
  document.getElementById(`url-${i}`).value = `https://youtu.be/${vid}`;
  hideErr(i); hideDZ(i); showSpin(i); focusCell(i);
  hideEmbed(i); hideWeb(i);
  if(!ytReady){ pending[i]=vid; return; }
  _ytCreateOrLoad(i,vid);
}

function _ytCreateOrLoad(i,vid) {
  if(players[i]) {
    players[i].loadVideoById(vid);
  } else {
    players[i] = new YT.Player(`yt-${i}`, {
      videoId: vid,
      playerVars: {
        autoplay:1, mute:S[i].muted?1:0, controls:1,
        rel:0, enablejsapi:1,
        origin: window.location.origin||window.location.href,
        playsinline:1,
      },
      events: {
        onReady: e => { hideSpin(i); if(S[i].muted) e.target.mute(); e.target.playVideo(); },
        onStateChange: e => {
          if(e.data===YT.PlayerState.PLAYING)   hideSpin(i);
          if(e.data===YT.PlayerState.BUFFERING)  showSpin(i);
        },
        onError: e => {
          hideSpin(i);
          const msgs={2:'Invalid video ID.',5:'Cannot play in HTML5 player.',
            100:'Video not found or private.',
            101:'Owner has disabled embedding.',150:'Owner has disabled embedding.'};
          showErr(i,'TRANSMISSION ERROR', msgs[e.data]||`Error code ${e.data}.`, true,
            `https://www.youtube.com/watch?v=${vid}`);
        },
      },
    });
  }
}

window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  for(const [idx,vid] of Object.entries(pending)) _ytCreateOrLoad(parseInt(idx),vid);
  pending = {};
};

// ══ VIMEO ══
function loadVimeo(i,vid) {
  setMode(i,'vimeo');
  S[i].videoId=vid; S[i].errUrl=`https://vimeo.com/${vid}`;
  document.getElementById(`url-${i}`).value=`https://vimeo.com/${vid}`;
  hideErr(i); hideDZ(i); showSpin(i); focusCell(i); hideWeb(i);
  if(players[i]){ try{players[i].pauseVideo();}catch(e){} }
  const ef=document.getElementById(`embed-${i}`);
  ef.onload=()=>hideSpin(i);
  ef.onerror=()=>showErr(i,'VIMEO ERROR','Could not load this Vimeo video.',true,S[i].errUrl);
  ef.src=`https://player.vimeo.com/video/${vid}?autoplay=1&title=0&byline=0`;
  ef.classList.add('show');
}

// ══ WEB ══
function loadWeb(i,url) {
  if(!url) return;
  setMode(i,'web');
  S[i].webUrl=url; S[i].errUrl=url;
  document.getElementById(`url-${i}`).value=url;
  hideErr(i); hideDZ(i); showSpin(i); focusCell(i); hideEmbed(i);
  if(players[i]){ try{players[i].pauseVideo();}catch(e){} }
  const wf=document.getElementById(`web-${i}`);
  wf.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
  wf.onload=()=>onWebLoad(i);
  wf.onerror=()=>onWebErr(i);
  wf.classList.add('show');
  wf.src=url;
}

function onWebLoad(i) {
  if(S[i].mode!=='web') return;
  hideSpin(i);
  try {
    const doc=document.getElementById(`web-${i}`).contentDocument;
    if(doc&&doc.body&&doc.body.innerHTML==='') onWebErr(i);
  } catch(e){}
}
function onWebErr(i) {
  if(S[i].mode!=='web') return;
  hideSpin(i);
  showErr(i,'SIGNAL BLOCKED',
    'This site uses X-Frame-Options or CSP headers to prevent loading inside frames.',
    true, S[i].errUrl);
}

// ══ CONTROLS ══
function setMode(i,mode) {
  S[i].mode=mode;
  const cell=document.getElementById(`cell-${i}`);
  cell.className=cell.className.replace(/\bmode-\S+/g,'').trim();
  if(mode!=='empty') cell.classList.add(`mode-${mode}`);
  const labels={yt:'YOUTUBE',vimeo:'VIMEO',web:'WEB',empty:'EMPTY'};
  document.getElementById(`mode-${i}`).textContent=labels[mode]||'EMPTY';
}

function toggleMute(i) {
  S[i].muted=!S[i].muted;
  const btn=document.getElementById(`mute-${i}`);
  if(btn){ btn.textContent=S[i].muted?'🔇':'🔊'; btn.classList.toggle('muted',S[i].muted); }
  if(players[i]&&S[i].mode==='yt') S[i].muted?players[i].mute():players[i].unMute();
}

function focusCell(i) {
  S.forEach((s,j)=>s.focused=j===i);
  document.querySelectorAll('.cell').forEach((c,j)=>c.classList.toggle('focused',j===i));
  if(layout==='full') applyLayout();
}

function clearContent(i) {
  if(players[i]){ try{players[i].stopVideo();players[i].destroy();}catch(e){} players[i]=null; }
  const body=document.getElementById(`body-${i}`);
  let ytDiv=document.getElementById(`yt-${i}`);
  if(!ytDiv){
    ytDiv=document.createElement('div');
    ytDiv.id=`yt-${i}`; ytDiv.className='yt-target';
    const spin=document.getElementById(`spin-${i}`);
    spin?spin.after(ytDiv):body.prepend(ytDiv);
  }
  hideEmbed(i); hideWeb(i);
  S[i].videoId=''; S[i].webUrl='';
  setMode(i,'empty');
  hideErr(i); showDZ(i); hideSpin(i);
}

function clearCell(i) {
  document.getElementById(`url-${i}`).value='';
  clearContent(i);
}

function hideEmbed(i) {
  const ef=document.getElementById(`embed-${i}`);
  if(ef){ef.classList.remove('show');ef.src='';ef.onload=null;ef.onerror=null;}
}
function hideWeb(i) {
  const wf=document.getElementById(`web-${i}`);
  if(wf){wf.classList.remove('show');wf.src='';wf.onload=null;wf.onerror=null;}
}
function openTab(i) { if(S[i].errUrl) window.open(S[i].errUrl,'_blank'); }

function pauseAll()  { players.forEach(p=>p&&p.pauseVideo()); }
function playAll()   { players.forEach(p=>p&&p.playVideo()); }
function reloadAll() {
  for(let i=0;i<CELLS;i++){
    if(S[i].mode==='yt'&&S[i].videoId&&players[i]) players[i].loadVideoById(S[i].videoId);
    else if(S[i].mode==='vimeo'&&S[i].videoId) loadVimeo(i,S[i].videoId);
    else if(S[i].mode==='web'&&S[i].webUrl) loadWeb(i,S[i].webUrl);
  }
}
function clearAll() { for(let i=0;i<CELLS;i++) clearCell(i); }

// ══ LAYOUT ══
function setLayout(name,el) {
  layout=name;
  document.querySelectorAll('.ly-btn').forEach(b=>b.classList.remove('on'));
  if(el) el.classList.add('on');
  applyLayout();
}
function applyLayout() {
  const g=document.getElementById('grid');
  g.className='';
  if(layout==='pip')  g.classList.add('l-pip');
  if(layout==='full'){
    g.classList.add('l-full');
    document.querySelectorAll('.cell').forEach((c,i)=>c.classList.toggle('focused',S[i].focused));
  }
}

// ══ UI HELPERS ══
function showDZ(i)   { document.getElementById(`dz-${i}`)?.classList.remove('gone'); }
function hideDZ(i)   { document.getElementById(`dz-${i}`)?.classList.add('gone'); }
function showSpin(i) { document.getElementById(`spin-${i}`)?.classList.add('show'); }
function hideSpin(i) { document.getElementById(`spin-${i}`)?.classList.remove('show'); }
function showErr(i,title,sub,showOpen,url) {
  document.getElementById(`err-title-${i}`).textContent=title;
  document.getElementById(`err-sub-${i}`).textContent=sub;
  const btn=document.getElementById(`err-open-${i}`);
  if(btn){ btn.style.display=showOpen?'inline-block':'none'; if(url) S[i].errUrl=url; }
  document.getElementById(`err-${i}`).classList.add('show');
  hideSpin(i);
}
function hideErr(i) { document.getElementById(`err-${i}`)?.classList.remove('show'); }

// ══ INIT ══
buildGrid();
(function(){
  const tag=document.createElement('script');
  tag.src='https://www.youtube.com/iframe_api';
  tag.async=true;
  document.head.appendChild(tag);
})();
</script>
